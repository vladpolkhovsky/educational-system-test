apiVersion: v1
kind: Service
metadata:
  name: collabora-online
  namespace: traefik
spec:
  selector:
    app: collabora-online
  ports:
    - port: 9980
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: collabora-online
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
  hostnames:
    - "collabora.docker.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: collabora-online
          port: 9980